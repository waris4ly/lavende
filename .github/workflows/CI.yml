name: CI

env:
  DEBUG: napi-*
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  # libopus (vendored by audiopus_sys) declares cmake_minimum_required < 3.5,
  # which modern CMake rejects outright. This tells CMake to treat it as 3.5.
  CMAKE_POLICY_VERSION_MINIMUM: '3.5'

permissions:
  contents: write
  id-token: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
            build: npm run build
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: x64
            build: npm run build
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            architecture: arm64
            build: npm run build
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
            build: npm run build
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
            build: npm run build

    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.settings.host == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev pkg-config cmake

      - name: Install system dependencies (macOS)
        if: matrix.settings.host == 'macos-latest'
        run: |
          brew install opus pkg-config cmake

      - name: Setup MSVC dev environment (Windows)
        if: matrix.settings.host == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install system dependencies (Windows)
        if: matrix.settings.host == 'windows-latest'
        shell: pwsh
        run: |
          choco install ninja -y
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          ninja --version
          cmake --version
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
          echo "OPUS_BUILD_FROM_SOURCE=1" >> $env:GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('rust/Cargo.toml') }}

      - name: Install dependencies
        run: npm ci

      - name: Build native binary
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            index.js
            index.d.ts

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts
        run: |
          for dir in artifacts/bindings-*; do
            if [ -d "$dir" ]; then
              cp -v $dir/*.node . 2>/dev/null || true
            fi
          done
          ls -la *.node

      - name: List packages
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.node
            index.js
            index.d.ts
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}