name: Python

env:
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  # libopus (vendored by audiopus_sys) declares cmake_minimum_required < 3.5,
  # which modern CMake rejects outright. This tells CMake to treat it as 3.5.
  CMAKE_POLICY_VERSION_MINIMUM: '3.5'

on:
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: windows-latest
            target: x64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev pkg-config cmake

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install opus pkg-config cmake

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          ninja --version
          cmake --version
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
          echo "OPUS_BUILD_FROM_SOURCE=1" >> $env:GITHUB_ENV

      - name: Set up QEMU (for ARM Linux builds)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src/python/Cargo.toml', 'library/Cargo.toml') }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ./src/python
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: 2_28
          before-script-linux: |
           if command -v yum &> /dev/null; then
            yum install -y opus-devel pkgconfig
           elif command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y libopus-dev pkg-config
           elif command -v apk &> /dev/null; then
            apk add opus-dev pkgconfig
           fi
        env:
         CFLAGS_aarch64_unknown_linux_gnu: "-march=armv8-a"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: src/python/dist

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev pkg-config cmake

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ./src/python
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: src/python/dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
